<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Diagnostic script to find overflowing elements
      window.addEventListener('load', () => {
        const findOverflow = () => {
          const docWidth = document.documentElement.offsetWidth;
          document.querySelectorAll('*').forEach(el => {
            if (el.offsetWidth > docWidth) {
              console.warn('OVERFLOWING ELEMENT FOUND:', el, 'Width:', el.offsetWidth, 'Expected:', docWidth);
              el.style.outline = '2px solid red'; // Temporary highlight
            }
          });
        };
        findOverflow();
        // Check again after a short delay for dynamic content
        setTimeout(findOverflow, 2000);
      });
    </script>
  </body>
</html>
